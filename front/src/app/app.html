<div class="container">
  <!-- ЛЕВАЯ КОЛОНКА -->
  <div class="left card"> <!-- Добавил card, чтобы был стиль карточки -->
    <h2>Ваши мысли</h2>
    <div class="dreams">
      <ul>
      @if (dreams){
        @for (dream of dreams; track dream){
          <li>
            <span>{{dream}}</span> <!-- Обернул текст в span -->
            <button class="btn btn-del" (click)="delItem(dream)">Удалить</button>
          </li>
        }
      }
      <li class="input-group"> <!-- Группа ввода для выравнивания -->
<button 
  class="btn btn-voice"  
  (click)="isListening ? stopListening() : startListening()">
  {{ isListening ? 'Остановить запись' : 'Голос' }}
</button>
<input [(ngModel)]="newDream" class="input-field" placeholder="Начните писать или говорите...">
        <!-- Используем [disabled], чтобы кнопка не нажималась, если поле пустое -->
        <button 
  class="btn btn-send" 
  (click)="AddItem(newDream)" 
  [disabled]="!newDream">
  Отправить
</button>
      </li>
      </ul>
    </div>
  </div>

  <!-- 🪄 КНОПКА МАГИИ (Ровно по центру) -->
  <div class="magic-divider">
    <button class="magic-btn" (click)="onMagicClick()" title="Структурировать нейросетью">
      M
    </button>
  </div>

  <!-- ПРАВАЯ КОЛОНКА -->
  <div class="right card"> <!-- Добавил card -->
    <h2>Структурирование</h2>
    <div class="dreams ai-result"> <!-- Добавил класс для стилей ответа -->
      <ul>
        @if (neuro_dreams){
        @for (nedream of neuro_dreams; track nedream){
          <li>{{nedream}}</li>
        }
      }@else{
        <li>Жду нажатия на кнопку!</li>
      }
      </ul>
    </div>
  </div>
</div>

<style>
  /* 1. Базовые переменные и сброс */
/* Базовый сброс */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: #f4f7f6; font-family: sans-serif; padding: 20px; }

.container {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
  align-items: start;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Кнопки */
.btn {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn-del { background: #fee2e2; color: #b91c1c; }
.btn-voice { background: #e5e7eb; color: #374151; }
.btn-send { background: #6366f1; color: #ffffff !important; } /* Исправлено: белый цвет */
.btn:hover { opacity: 0.8; }

/* Поле ввода */
.input-group {
  display: flex;
  gap: 8px;
  padding: 10px 0;
  border-top: 1px solid #eee;
  margin-top: 10px;
}
.input-field {
  flex: 1;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* Кнопка Магии - M */
.magic-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 50px;
}
.magic-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: #6366f1;
  color: white !important; /* Исправлено: принудительно белый текст */
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4);
}

/* Списки */
ul { list-style: none; }
li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}

/* Адаптив */
@media (max-width: 768px) {
  .container { grid-template-columns: 1fr; }
  .magic-divider { padding: 20px 0; }
}
</style>
