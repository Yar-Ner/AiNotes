<div class="container">
  <!-- ЛЕВАЯ КОЛОНКА -->
  <div class="left">
    <h2>Ваши мысли</h2>
    <div class="dreams">
      <ul>
      @if (dreams){
        @for (dream of dreams; track dream){
          <li>{{dream}}<button (click)="delItem(dream)">Удалить</button></li>
        }
      }
      <li>
        <button>Голос</button>
        <input #dreamInput placeholder="Начните писать или говорить по кнопке справа...">
        <button (click)="AddItem(dreamInput)">Отправить</button>
      </li>
      </ul>
    </div>
  </div>

  <!-- 🪄 КНОПКА МАГИИ (Ровно по центру) -->
  <div class="magic-divider">
    <button class="magic-btn" (click)="onMagicClick()" title="Структурировать нейросетью">
      M
    </button>
  </div>

  <!-- ПРАВАЯ КОЛОНКА -->
  <div class="right">
    <h2>Структурирование</h2>
    <div class="dreams">
      <ul>
        @if (neuro_dreams){
        @for (nedream of neuro_dreams; track nedream){
          <li>{{nedream}}</li>
        }
      }@else{
        <li>Жду нажатия на кнопку!</li>
      }
        
      </ul>
    </div>
  </div>
</div>

<style>
